<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L Train Board</title>
  <style>
    /* The whole page */
    body {
        background-color: #0a0a0a;
        color: #f0e6c8;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    /* Header bar */
    .header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        background: #111;
        border-bottom: 2px solid #a6a6a6;
    }

    /* The grey L circle */
    .badge {
        background: #a6a6a6;
        color: #000;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
    }

    /* Station name — takes up remaining space */
    .station-name {
        flex: 1;
        font-size: 20px;
    }

    /* Clock on the right */
    .clock {
        font-size: 20px;
        color: #aaa;
    }

    /* "TO MANHATTAN" / "TO CANARSIE" labels */
    .direction-label {
        background: #1a1a1a;
        padding: 6px 16px;
        font-size: 11px;
        letter-spacing: 2px;
        color: #888;
        border-top: 1px solid #333;
        border-bottom: 1px solid #333;
    }

    /* Each train row */
    .train-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        border-bottom: 1px solid #1c1c1c;
    }

    /* Small L bullet inside each row */
    .bullet {
        background: #a6a6a6;
        color: #000;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: bold;
        flex-shrink: 0;
    }

    /* Destination text — fills remaining space */
    .destination {
        flex: 1;
        font-size: 16px;
    }

    /* Countdown number on the right */
    .countdown {
        font-size: 22px;
        color: #6abf69;
        min-width: 70px;
        text-align: right;
    }


  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="badge">L</div>
    <div class="station-name">Bedford Av</div>
    <div class="clock" id="clock"></div>
  </div>
  <!-- TO MANHATTAN -->
  <div class="direction-label">TO MANHATTAN</div>

  <div class="train-row">
    <div class="bullet">L</div>
    <div class="destination">8 Av</div>
    <div class="countdown">3 min</div>
  </div>

  <div class="train-row">
    <div class="bullet">L</div>
    <div class="destination">8 Av</div>
    <div class="countdown">11 min</div>
  </div>

  <!-- TO CANARSIE -->
  <div class="direction-label">TO CANARSIE</div>

  <div class="train-row">
    <div class="bullet">L</div>
    <div class="destination">Canarsie–Rockaway Pkwy</div>
    <div class="countdown">7 min</div>
  </div>

  <div class="train-row">
    <div class="bullet">L</div>
    <div class="destination">Canarsie–Rockaway Pkwy</div>
    <div class="countdown">18 min</div>
  </div>
    <script>

    // This function reads the current time and updates the clock
    function updateClock() {

        // Get the current date and time from the browser
        const now = new Date();

        // Pull out hours and minutes as numbers
        const hours = now.getHours();
        const minutes = now.getMinutes();

        // Pad with a zero if needed — so 9 becomes "09"
        const h = String(hours).padStart(2, '0');
        const m = String(minutes).padStart(2, '0');

        // Find the clock element and update its text
        document.getElementById('clock').textContent = h + ':' + m;
    }

    // Run it once immediately so the clock shows on page load
    updateClock();

    // Then run it every 60 seconds to keep it current
    setInterval(updateClock, 60000);

    </script>
</body>
</html>
